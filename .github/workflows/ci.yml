name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        continue-on-error: true

      - name: Build
        run: bun run build

      - name: Audit
        run: bun audit
